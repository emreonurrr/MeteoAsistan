<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoAsistan Pro - Emre Onur</title>
    <style>
        :root {
            /* Sinematik Gökyüzü Renk Matrisi */
            --sky-gradient: linear-gradient(180deg, #0b1528 0%, #0f172a 100%);
            --card-bg: rgba(8, 11, 22, 0.75); /* Okunabilirliği garantileyen koyu cam katmanı */
            --border-line: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--sky-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 16px;
            position: relative;
            overflow-x: hidden;
            transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ARKA PLAN SİMÜLASYONU --- */
        .sky-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* Gece Yıldız Atmosferi */
        .starfield {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: pulse 2.5s infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Gök Cisimleri */
        .orb {
            position: absolute;
            top: 8%; right: 10%;
            width: 70px; height: 70px;
            border-radius: 50%;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.5);
        }
        .orb.sun {
            background: radial-gradient(circle, #ffffff 0%, #fecdd3 30%, #fb923c 100%);
            box-shadow: 0 0 50px rgba(251, 146, 60, 0.4);
            opacity: 1; transform: scale(1);
        }
        .orb.moon {
            background: radial-gradient(circle, #f8fafc 0%, #e2e8f0 100%);
            box-shadow: 0 0 30px rgba(226, 232, 240, 0.2);
            opacity: 1; transform: scale(1);
        }

        /* --- KART TASARIMI --- */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-line);
            padding: 32px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 10;
        }

        .dev-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
            color: var(--text-muted);
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* --- SEÇİM ALANI --- */
        .custom-select {
            position: relative;
            margin-bottom: 24px;
        }

        .select-element {
            width: 100%;
            padding: 15px 18px;
            border-radius: 12px;
            border: 1px solid var(--border-line);
            background: #090d16;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.3s;
        }

        .select-element:focus {
            border-color: var(--accent-color);
        }

        .custom-select::after {
            content: '▼';
            font-size: 0.7rem;
            top: 19px; right: 18px;
            position: absolute;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* --- VERİ PANELLERİ --- */
        .output-zone { display: none; }
        
        .clock-lbl {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .city-lbl { font-size: 1.9rem; font-weight: 700; }
        .temp-lbl { font-size: 4.2rem; font-weight: 800; margin: 2px 0; letter-spacing: -2px; }
        .status-lbl { font-size: 1.1rem; font-weight: 600; color: var(--accent-color); margin-bottom: 24px; }

        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-line);
            padding: 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stat-card span {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 4px;
        }

        .panel-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-line);
            padding: 16px;
            border-radius: 14px;
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .panel-box.highlight {
            background: rgba(56, 189, 248, 0.04);
            border-color: rgba(56, 189, 248, 0.2);
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .panel-box strong { color: var(--accent-color); }

        .audio-btn {
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .audio-btn:hover { background: rgba(56, 189, 248, 0.25); }

        .spinner {
            display: none;
            margin: 20px auto;
            border: 3px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top: 3px solid var(--accent-color);
            width: 32px; height: 32px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="sky-canvas">
        <div id="starfield" class="starfield"></div>
        <div id="orb" class="orb"></div>
    </div>

    <div class="main-card">
        <div class="dev-badge">Emre Onur Geliştirme Laboratuvarı</div>
        <h1>MeteoAsistan Pro</h1>
        <div class="subtitle">Çoklu Parametrik Giysi Karar Destek Sistemi</div>
        
        <div class="custom-select">
            <select id="citySelect" class="select-element">
                <option value="" disabled selected>Analiz edilecek şehri seçiniz...</option>
            </select>
        </div>

        <div id="spinner" class="spinner"></div>

        <div id="outputZone" class="output-zone">
            <div id="timeDisplay" class="clock-lbl">YEREL SAAT: --:--</div>
            <div class="city-lbl" id="cityName">--</div>
            <div class="temp-lbl" id="tempDisplay">--°C</div>
            <div class="status-lbl" id="weatherStatus">--</div>

            <div class="grid-stats">
                <div class="stat-card">💧 Bağıl Nem <span id="humidityDisplay">--</span></div>
                <div class="stat-card">💨 Rüzgar Hızı <span id="windDisplay">--</span></div>
            </div>

            <div class="panel-box">
                <strong>📊 Algoritmik Veri Analizi:</strong>
                <p id="analysisText">İstasyon logları işleniyor...</p>
            </div>

            <div class="panel-box highlight">
                <div class="box-header">
                    <strong>💡 Kıyafet ve Donanım Önerisi:</strong>
                    <button id="speakButton" class="audio-btn">Sesli Dinle 🔊</button>
                </div>
                <p id="adviceText">Hesaplanıyor...</p>
            </div>
        </div>
    </div>

    <script>
        const turkeyCities = [
            { name: "Adana", lat: 37.00, lon: 35.32 }, { name: "Adıyaman", lat: 37.76, lon: 38.28 },
            { name: "Afyonkarahisar", lat: 38.75, lon: 30.54 }, { name: "Ağrı", lat: 39.72, lon: 43.05 },
            { name: "Amasya", lat: 40.65, lon: 35.83 }, { name: "Ankara", lat: 39.93, lon: 32.85 },
            { name: "Antalya", lat: 36.88, lon: 30.70 }, { name: "Artvin", lat: 41.18, lon: 41.82 },
            { name: "Aydın", lat: 37.84, lon: 27.84 }, { name: "Balıkesir", lat: 39.64, lon: 27.88 },
            { name: "Bilecik", lat: 40.14, lon: 29.97 }, { name: "Bingöl", lat: 38.88, lon: 40.49 },
            { name: "Bitlis", lat: 38.40, lon: 42.11 }, { name: "Bolu", lat: 40.73, lon: 31.60 },
            { name: "Burdur", lat: 37.72, lon: 30.28 }, { name: "Bursa", lat: 40.18, lon: 29.06 },
            { name: "Çanakkale", lat: 40.15, lon: 26.41 }, { name: "Çankırı", lat: 40.60, lon: 33.61 },
            { name: "Çorum", lat: 40.54, lon: 34.95 }, { name: "Denizli", lat: 37.77, lon: 29.08 },
            { name: "Diyarbakır", lat: 37.91, lon: 40.24 }, { name: "Edirne", lat: 41.67, lon: 26.55 },
            { name: "Elazığ", lat: 38.67, lon: 39.22 }, { name: "Erzincan", lat: 39.74, lon: 39.49 },
            { name: "Erzurum", lat: 39.90, lon: 41.27 }, { name: "Eskişehir", lat: 39.77, lon: 30.52 },
            { name: "Gaziantep", lat: 37.06, lon: 37.38 }, { name: "Giresun", lat: 40.91, lon: 38.38 },
            { name: "Gümüşhane", lat: 40.45, lon: 39.47 }, { name: "Hakkari", lat: 37.57, lon: 43.73 },
            { name: "Hatay", lat: 36.20, lon: 36.16 }, { name: "Isparta", lat: 37.76, lon: 30.55 },
            { name: "Mersin", lat: 36.81, lon: 34.63 }, { name: "İstanbul", lat: 41.00, lon: 28.97 },
            { name: "İzmir", lat: 38.41, lon: 27.12 }, { name: "Kars", lat: 40.60, lon: 43.09 },
            { name: "Kastamonu", lat: 41.37, lon: 33.77 }, { name: "Kayseri", lat: 38.73, lon: 35.48 },
            { name: "Kırklareli", lat: 41.73, lon: 27.22 }, { name: "Kırşehir", lat: 39.14, lon: 34.16 },
            { name: "Kocaeli", lat: 40.76, lon: 29.91 }, { name: "Konya", lat: 37.87, lon: 32.48 },
            { name: "Kütahya", lat: 39.42, lon: 29.98 }, { name: "Malatya", lat: 38.35, lon: 38.31 },
            { name: "Manisa", lat: 38.61, lon: 27.42 }, { name: "Kahramanmaraş", lat: 37.58, lon: 36.93 },
            { name: "Mardin", lat: 37.31, lon: 40.73 }, { name: "Muğla", lat: 37.21, lon: 28.36 },
            { name: "Muş", lat: 38.73, lon: 41.49 }, { name: "Nevşehir", lat: 38.62, lon: 34.71 },
            { name: "Niğde", lat: 37.96, lon: 34.67 }, { name: "Ordu", lat: 40.98, lon: 37.87 },
            { name: "Rize", lat: 41.02, lon: 40.51 }, { name: "Sakarya", lat: 40.77, lon: 30.39 },
            { name: "Samsun", lat: 41.28, lon: 36.33 }, { name: "Siirt", lat: 37.93, lon: 41.94 },
            { name: "Sinop", lat: 42.02, lon: 35.15 }, { name: "Sivas", lat: 39.74, lon: 37.01 },
            { name: "Tekirdağ", lat: 40.97, lon: 27.51 }, { name: "Tokat", lat: 40.31, lon: 36.55 },
            { name: "Trabzon", lat: 41.00, lon: 39.71 }, { name: "Tunceli", lat: 39.10, lon: 39.54 },
            { name: "Şanlıurfa", lat: 37.16, lon: 38.79 }, { name: "Uşak", lat: 38.67, lon: 29.40 },
            { name: "Van", lat: 38.50, lon: 43.37 }, { name: "Yozgat", lat: 39.82, lon: 34.80 },
            { name: "Zonguldak", lat: 41.45, lon: 31.79 }, { name: "Aksaray", lat: 38.37, lon: 34.02 },
            { name: "Bayburt", lat: 40.25, lon: 40.22 }, { name: "Karaman", lat: 37.18, lon: 33.21 },
            { name: "Kırıkkale", lat: 39.84, lon: 33.51 }, { name: "Batman", lat: 37.88, lon: 41.12 },
            { name: "Şırnak", lat: 37.52, lon: 42.45 }, { name: "Bartın", lat: 41.63, lon: 32.33 },
            { name: "Ardahan", lat: 41.11, lon: 42.70 }, { name: "Iğdır", lat: 39.92, lon: 44.04 },
            { name: "Yalova", lat: 40.65, lon: 29.27 }, { name: "Karabük", lat: 41.19, lon: 32.62 },
            { name: "Kilis", lat: 36.71, lon: 37.11 }, { name: "Osmaniye", lat: 37.07, lon: 36.24 },
            { name: "Düzce", lat: 40.84, lon: 31.16 }
        ].sort((a, b) => a.name.localeCompare(b.name, 'tr'));

        const citySelect = document.getElementById('citySelect');
        const outputZone = document.getElementById('outputZone');
        const spinner = document.getElementById('spinner');
        const timeDisplay = document.getElementById('timeDisplay');
        const cityName = document.getElementById('cityName');
        const tempDisplay = document.getElementById('tempDisplay');
        const weatherStatus = document.getElementById('weatherStatus');
        const humidityDisplay = document.getElementById('humidityDisplay');
        const windDisplay = document.getElementById('windDisplay');
        const adviceText = document.getElementById('adviceText');
        const analysisText = document.getElementById('analysisText');
        const speakButton = document.getElementById('speakButton');
        const orb = document.getElementById('orb');
        const starfield = document.getElementById('starfield');

        // Yıldız Matrisini İnşa Et
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = (Math.random() * 2 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2.5 + 's';
            starfield.appendChild(star);
        }

        turkeyCities.forEach((city, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = city.name;
            citySelect.appendChild(option);
        });

        function translateWMO(code) {
            const dictionary = {
                0: "Açık", 1: "Çoğunlukla Açık", 2: "Parçalı Bulutlu", 3: "Bulutlu",
                45: "Sisli", 48: "Kırağı Sisli", 51: "Hafif Çiseleme", 53: "Çiseleyen Yağmur",
                55: "Yoğun Çiseleme", 61: "Hafif Yağmur", 63: "Yağmurlu", 65: "Şiddetli Yağmur",
                71: "Hafif Kar", 73: "Karlı", 75: "Yoğun Karlı", 80: "Hafif Sağanak", 
                81: "Sağanak Yağış", 82: "Şiddetli Sağanak", 95: "Gökgürültülü Fırtına"
            };
            return dictionary[code] || "Atmosferik Değişim";
        }

        // Yumuşak Gökyüzü Renk Motoru (Okunabilirlik Odaklı Pastel Tonlar)
        function shiftSkyEnvironment(hour) {
            if (hour >= 5 && hour < 8) { 
                // Gündoğumu (Pastel Şafak)
                document.documentElement.style.setProperty('--sky-gradient', 'linear-gradient(180deg, #312e81 0%, #581c87 40%, #831843 100%)');
                orb.className = "orb sun";
                starfield.style.opacity = "0";
            } else if (hour >= 8 && hour < 17) { 
                // Gün Ortası (Kurumsal Temiz Mavi)
                document.documentElement.style.setProperty('--sky-gradient', 'linear-gradient(180deg, #075985 0%, #0c4a6e 100%)');
                orb.className = "orb sun";
                starfield.style.opacity = "0";
            } else if (hour >= 17 && hour < 20) { 
                // Günbatımı (Pastel Amber/Kızıl)
                document.documentElement.style.setProperty('--sky-gradient', 'linear-gradient(180deg, #1e1b4b 0%, #701a75 50%, #4c0519 100%)');
                orb.className = "orb sun";
                starfield.style.opacity = "0";
            } else { 
                // Gece (Güvenli Derin Gece Mavisi)
                document.documentElement.style.setProperty('--sky-gradient', 'linear-gradient(180deg, #020617 0%, #0f172a 100%)');
                orb.className = "orb moon";
                starfield.style.opacity = "1";
            }
        }

        async function getWeatherData(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`;
            const res = await fetch(url);
            return await res.json();
        }

        citySelect.addEventListener('change', async (e) => {
            window.speechSynthesis.cancel();
            const city = turkeyCities[e.target.value];

            outputZone.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const apiData = await getWeatherData(city.lat, city.lon);
                const current = apiData.current;
                
                const now = new Date();
                const hour = now.getHours();
                timeDisplay.textContent = `YEREL SAAT: ${now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })}`;

                cityName.textContent = city.name;
                const roundedTemp = Math.round(current.temperature_2m);
                tempDisplay.textContent = `${roundedTemp}°C`;
                
                const stateString = translateWMO(current.weather_code);
                weatherStatus.textContent = stateString;
                humidityDisplay.textContent = `%${current.relative_humidity_2m}`;
                windDisplay.textContent = `${Math.round(current.wind_speed_10m)} km/s`;

                shiftSkyEnvironment(hour);

                // --- HATALARI SIFIRLAYAN MATRİX ALGORİTMASI ---
                let temp = current.temperature_2m;
                let code = current.weather_code;
                let advice = "";

                if (temp <= 5) {
                    advice += `Hava dondurucu derecede soğuk (${roundedTemp}°C). Isı yalıtımlı kışlık mont, kalın kazak, bere ve eldiven kombinasyonu hayati önem taşır. `;
                } else if (temp > 5 && temp <= 14) {
                    advice += `Hava kış şartlarında ve serin (${roundedTemp}°C). Kalın bir ceket, kaban veya rüzgar kesici dış katman tercih etmelisiniz. `;
                } else if (temp > 14 && temp <= 19) {
                    advice += `Ilık-serin bir geçiş havası hakim (${roundedTemp}°C). Mevsimlik bir kot ceket, hırka veya sweatshirt konforlu kalmanızı sağlayacaktır. `;
                } else if (temp > 19 && temp <= 24) {
                    // 23 Derece "Parçalı Bulutlu" Optimizasyon Alanı
                    if ([1, 2, 3].includes(code)) {
                        advice += `Hava ${roundedTemp}°C ile son derece ideal ve ılık bir dengede. Ancak gökyüzünde bulutlanma olduğundan, güneş kapandığında oluşabilecek anlık serinliğe karşı basic bir tişört üzerine hafif bir hırka veya ince bir gömlek almanız en dengeli seçimdir. `;
                    } else {
                        advice += `Hava oldukça konforlu, açık ve ılık (${roundedTemp}°C). Kısa kollu rahat tişörtler veya hafif kumaş pantolonlar tek başına tamamen yeterlidir. `;
                    }
                } else if (temp > 24 && temp <= 32) {
                    advice += `Yaz sıcaklığı hissediliyor (${roundedTemp}°C). Terletmeyen ince, pamuklu giysiler seçerek vücut ısınızı dengede tutun. `;
                } else {
                    advice += `Yüksek sıcaklık uyarısı (${roundedTemp}°C). Açık renkli keten kıyafetler, şapka ve güneş gözlüğü kullanımı önerilir. `;
                }

                // Yağış Entegrasyonu
                if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) {
                    advice += "Ayrıca yağış geçişleri gözlemlendiği için yanınıza kesinlikle bir şemsiye almalısınız.";
                }

                analysisText.textContent = `Bileşik Karar Motoru Verisi: Ortam sıcaklığı ${temp}°C, atmosferik durum kodu ${code} (${stateString}). Algoritma, ham verileri konfor endeksi parametreleriyle hatasız eşleştirerek nihai durum çıktısını üretti.`;
                adviceText.textContent = advice;
                
                spinner.style.display = 'none';
                outputZone.style.display = 'block';

            } catch (err) {
                spinner.style.display = 'none';
                alert("API verisi senkronize edilemedi.");
            }
        });

        // Ses Motoru Tetikleyicisi
        speakButton.addEventListener('click', () => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(adviceText.textContent);
                utterance.lang = 'tr-TR';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        });
    </script>
</body>
</html>
